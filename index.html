<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Structure Studios</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: #000;
      color: #fff;
    }

    header {
      display: flex;
      justify-content: space-between;
      padding: 20px 40px;
      font-weight: 500;
      letter-spacing: 2px;
    }

    header a {
      color: white;
      text-decoration: none;
      margin-left: 20px;
      font-size: 14px;
    }

    .hero {
      height: 90vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      background: url('https://images.unsplash.com/photo-1520975916090-3105956dac38') center/cover;
    }

    .hero h1 {
      font-size: 48px;
      margin-bottom: 10px;
      letter-spacing: 3px;
    }

    .hero p {
      opacity: 0.7;
      margin-bottom: 20px;
    }

    .btn {
      padding: 12px 30px;
      background: white;
      color: black;
      text-decoration: none;
      font-weight: 600;
      transition: 0.3s;
    }

    .btn:hover {
      background: #ccc;
    }

    .section {
      padding: 80px 40px;
      text-align: center;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 30px;
      margin-top: 40px;
    }

    .product {
      background: #111;
      padding: 20px;
      transition: 0.3s;
    }

    .product:hover {
      transform: translateY(-5px);
    }

    .product img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      margin-bottom: 15px;
    }

    footer {
      text-align: center;
      padding: 30px;
      font-size: 12px;
      opacity: 0.5;
    }
  </style>
</head>

<body>

<header>
  <div>STRUCTURE</div>
  <nav>
    <a href="#">Shop</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
  </nav>
</header>

<section class="hero">
  <h1>STRUCTURE STUDIOS</h1>
  <p>Built Different</p>
  <a href="#" class="btn">Shop Now</a>
</section>

<section class="section">
  <h2>Featured</h2>

  <div class="products">
    <div class="product">
      <img src="https://images.unsplash.com/photo-1600185365483-26d7a4cc7519">
      <p>Black Skull Cap</p>
    </div>

    <div class="product">
      <img src="https://images.unsplash.com/photo-1585386959984-a415522316c3">
      <p>White Skull Cap</p>
    </div>

    <div class="product">
      <img src="https://images.unsplash.com/photo-1520975922203-bc55c28f3d57">
      <p>Purple Skull Cap</p>
    </div>
  </div>
</section>

<footer>
  © 2026 Structure Studios
</footer>

</body>
</html>
