<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Structure Studios</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  background: #000;
  color: #fff;
  overflow-x: hidden;
}

/* NAV */
header {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: 90%;
  padding: 15px 30px;
  display: flex;
  justify-content: space-between;
  border-radius: 50px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  z-index: 1000;
}

header div {
  font-weight: 600;
  letter-spacing: 2px;
}

header a {
  color: white;
  text-decoration: none;
  margin-left: 20px;
  font-size: 13px;
  opacity: 0.7;
  transition: 0.3s;
}

header a:hover {
  opacity: 1;
}

/* HERO */
.hero {
  height: 100vh;
  background: url('https://images.unsplash.com/photo-1516822003754-cca485356ecb') center/cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  position: relative;
}

.hero::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(to bottom, rgba(0,0,0,0.2), #000);
}

.hero-content {
  position: relative;
  z-index: 2;
  animation: fadeUp 1s ease forwards;
}

.hero h1 {
  font-size: 64px;
  font-weight: 500;
  letter-spacing: 6px;
}

.hero p {
  margin-top: 10px;
  opacity: 0.6;
  font-size: 14px;
  letter-spacing: 2px;
}

.btn {
  display: inline-block;
  margin-top: 30px;
  padding: 14px 36px;
  border-radius: 30px;
  background: white;
  color: black;
  text-decoration: none;
  font-weight: 500;
  transition: 0.3s;
}

.btn:hover {
  transform: translateY(-2px);
  background: #ddd;
}

/* SECTION */
.section {
  padding: 140px 8%;
}

/* PRODUCTS */
.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 50px;
}

.product {
  border-radius: 20px;
  overflow: hidden;
  position: relative;
}

.product img {
  width: 100%;
  height: 340px;
  object-fit: cover;
  transition: 0.5s;
}

.product:hover img {
  transform: scale(1.08);
}

.product::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
}

.product p {
  position: absolute;
  bottom: 15px;
  left: 20px;
  z-index: 2;
  font-size: 14px;
  letter-spacing: 1px;
}

/* LOOKBOOK */
.lookbook {
  display: grid;
  gap: 20px;
}

.lookbook img {
  width: 100%;
  height: 500px;
  object-fit: cover;
  border-radius: 20px;
  transition: 0.5s;
}

.lookbook img:hover {
  transform: scale(1.03);
}

/* ABOUT */
.about {
  max-width: 600px;
  line-height: 1.7;
  opacity: 0.7;
  font-size: 15px;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 60px;
  opacity: 0.4;
}

/* ANIMATIONS */
@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(40px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* FADE ON SCROLL */
.fade {
  opacity: 0;
  transform: translateY(40px);
  transition: 1s;
}

.fade.show {
  opacity: 1;
  transform: translateY(0);
}

/* MOBILE */
@media(max-width: 768px){
  .hero h1 {
    font-size: 40px;
  }

  header {
    width: 95%;
  }

  .section {
    padding: 100px 20px;
  }
}
</style>
</head>

<body>

<header>
  <div>STRUCTURE</div>
  <nav>
    <a href="#shop">Shop</a>
    <a href="#look">Lookbook</a>
    <a href="#about">About</a>
  </nav>
</header>

<section class="hero">
  <div class="hero-content">
    <h1>STRUCTURE STUDIOS</h1>
    <p>BUILT DIFFERENT</p>
    <a href="#" class="btn">SHOP NOW</a>
  </div>
</section>

<section id="shop" class="section fade">
  <div class="products">

    <div class="product">
      <img src="https://images.unsplash.com/photo-1600185365483-26d7a4cc7519">
      <p>BLACK CAP</p>
    </div>

    <div class="product">
      <img src="https://images.unsplash.com/photo-1585386959984-a415522316c3">
      <p>WHITE CAP</p>
    </div>

    <div class="product">
      <img src="https://images.unsplash.com/photo-1520975922203-bc55c28f3d57">
      <p>PURPLE CAP</p>
    </div>

  </div>
</section>

<section id="look" class="section fade">
  <div class="lookbook">
    <img src="https://images.unsplash.com/photo-1490481651871-ab68de25d43d">
    <img src="https://images.unsplash.com/photo-1503342217505-b0a15ec3261c">
  </div>
</section>

<section id="about" class="section fade">
  <p class="about">
    Structure Studios is built on discipline, movement, and identity.
    Designed for those who move with purpose.
    This is structure.
  </p>
</section>

<footer>
  © 2026 Structure Studios
</footer>

<script>
const faders = document.querySelectorAll('.fade');

window.addEventListener('scroll', () => {
  faders.forEach(el => {
    const top = el.getBoundingClientRect().top;
    if(top < window.innerHeight - 100){
      el.classList.add('show');
    }
  });
});
</script>

</body>
</html>
