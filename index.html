<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Structure Studios</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }

body { background:#000; color:#fff; overflow-x:hidden; }

/* LOADER */
.loader {
  position: fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:2000;
  font-size:20px;
  letter-spacing:2px;
}

/* NAV */
header {
  position: fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  width:90%;
  padding:15px 30px;
  display:flex;
  justify-content:space-between;
  border-radius:50px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  z-index:1000;
}

header nav a {
  color:white;
  margin-left:20px;
  text-decoration:none;
  opacity:0.7;
}

/* HERO */
.hero {
  height:100vh;
  background:url('https://images.unsplash.com/photo-1516822003754-cca485356ecb') center/cover no-repeat;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.btn {
  margin-top:20px;
  padding:12px 30px;
  border-radius:30px;
  background:white;
  color:black;
  text-decoration:none;
}

/* PRODUCTS */
.section { padding:120px 8%; }

.products {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:40px;
}

.product {
  border-radius:20px;
  overflow:hidden;
  cursor:pointer;
}

.product img {
  width:100%;
  height:300px;
  object-fit:cover;
}

/* CART */
.cart {
  position:fixed;
  right:-400px;
  top:0;
  width:350px;
  height:100%;
  background:#111;
  padding:20px;
  transition:0.4s;
  z-index:1500;
}

.cart.open { right:0; }

.cart h2 { margin-bottom:20px; }

.cart-item { margin-bottom:15px; }

/* BUTTON */
.add-btn {
  margin-top:10px;
  padding:8px 20px;
  background:white;
  color:black;
  border:none;
  cursor:pointer;
}

/* FADE */
.fade { opacity:0; transform:translateY(40px); transition:1s; }
.fade.show { opacity:1; transform:translateY(0); }

</style>
</head>

<body>

<div class="loader" id="loader">STRUCTURE</div>

<header>
  <div>STRUCTURE</div>
  <nav>
    <a href="#shop">Shop</a>
    <a href="#" onclick="toggleCart()">Cart</a>
  </nav>
</header>

<div class="cart" id="cart">
  <h2>Your Cart</h2>
  <div id="cartItems"></div>
</div>

<section class="hero">
  <div>
    <h1>STRUCTURE STUDIOS</h1>
    <p>Built Different</p>
    <a href="#" class="btn">Shop Now</a>
  </div>
</section>

<section id="shop" class="section fade">
  <div class="products">

    <div class="product" onclick="addToCart('Black Cap')">
      <img src="https://images.unsplash.com/photo-1600185365483-26d7a4cc7519">
      <p>Black Cap</p>
      <button class="add-btn">Add to Cart</button>
    </div>

    <div class="product" onclick="addToCart('White Cap')">
      <img src="https://images.unsplash.com/photo-1585386959984-a415522316c3">
      <p>White Cap</p>
      <button class="add-btn">Add to Cart</button>
    </div>

  </div>
</section>

<script>
/* LOADER */
window.onload = () => {
  setTimeout(()=> {
    document.getElementById("loader").style.display="none";
  },1000);
}

/* CART */
function toggleCart(){
  document.getElementById("cart").classList.toggle("open");
}

function addToCart(item){
  const div = document.createElement("div");
  div.className="cart-item";
  div.innerText=item;
  document.getElementById("cartItems").appendChild(div);
  toggleCart();
}

/* SCROLL FADE */
const faders = document.querySelectorAll('.fade');
window.addEventListener('scroll', () => {
  faders.forEach(el => {
    if(el.getBoundingClientRect().top < window.innerHeight - 100){
      el.classList.add('show');
    }
  });
});
</script>

</body>
</html>
